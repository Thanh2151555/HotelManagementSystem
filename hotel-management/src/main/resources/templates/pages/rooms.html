<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{__${layout}__ :: main('Room Management', ~{::div})}">
<head>
    <title>Room Management</title>
</head>
<body>
    <div class="container-fluid">
        <!-- Header & Add Button -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Room Management</h4>
            <button class="btn btn-primary" onclick="RoomModule.openAddModal()">
                <i class="fa-solid fa-plus me-2"></i> Add New Room
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form id="roomFilterForm" class="row g-3 align-items-end" onsubmit="event.preventDefault(); RoomModule.loadRooms();">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Status Filter</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">All Statuses</option>
                            <option value="AVAILABLE">AVAILABLE</option>
                            <option value="OCCUPIED">OCCUPIED</option>
                            <option value="DIRTY">DIRTY</option>
                            <option value="MAINTENANCE">MAINTENANCE</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Room Type</label>
                        <select class="form-select" id="filterRoomType">
                            <option value="">All Types</option>
                            <!-- Room types loaded dynamically -->
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary px-4 me-2">Filter</button>
                        <button type="button" class="btn btn-outline-secondary px-4" onclick="RoomModule.resetFilter()">Reset</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Room Number</th>
                                <th>Type</th>
                                <th>Floor</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="roomsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Room Modal -->
    <div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <form id="roomForm" onsubmit="event.preventDefault(); RoomModule.saveRoom();">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="roomModalTitle">Add Room</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="roomId" name="id">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Room Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="roomNumber" name="roomNumber" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Floor Number <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="floorNumber" name="floorNumber" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Room Type <span class="text-danger">*</span></label>
                            <select class="form-select" id="roomTypeId" name="roomTypeId" required>
                                <!-- Loaded dynamically -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status</label>
                            <select class="form-select" id="roomStatus" name="status">
                                <option value="AVAILABLE">AVAILABLE</option>
                                <option value="OCCUPIED">OCCUPIED</option>
                                <option value="DIRTY">DIRTY</option>
                                <option value="MAINTENANCE">MAINTENANCE</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btnSaveRoom">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/modules/rooms.js"></script>
</body>
</html>
