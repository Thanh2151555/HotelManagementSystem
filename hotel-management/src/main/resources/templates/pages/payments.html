<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{__${layout}__ :: main('Payments', ~{::div})}">
<head>
    <title>Payments</title>
</head>
<body>
    <div class="container-fluid">
        <!-- Filter Bar -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form id="paymentFilterForm" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Search by Invoice ID</label>
                        <input type="text" class="form-control" id="filterInvoiceId" placeholder="Enter Invoice ID">
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary-custom me-2"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
                        <button type="button" class="btn btn-outline-secondary" id="btnResetFilter"><i class="fa-solid fa-rotate-left"></i> Reset</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Payment Ref</th>
                                <th>Invoice ID</th>
                                <th>Method</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Time</th>
                                <th>Received By</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/payments.js"></script>
</body>
</html>
