<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{__${layout}__ :: main('Reservation Management', ~{::div})}">
<head>
    <title>Reservation Management</title>
</head>
<body>
    <div class="container-fluid">
        <!-- Header & Add Button -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Reservation Management</h4>
            <a href="/admin/reservations?action=new" class="btn btn-primary">
                <i class="fa-solid fa-plus me-2"></i> Create Reservation
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form id="reservationFilterForm" class="row g-3 align-items-end" onsubmit="event.preventDefault(); ReservationModule.loadReservations(0);">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">All Statuses</option>
                            <option value="PENDING">Pending</option>
                            <option value="CONFIRMED">Confirmed</option>
                            <option value="CHECKED_IN">Checked In</option>
                            <option value="CHECKED_OUT">Checked Out</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">Search Guest</label>
                        <input type="text" class="form-control" id="filterKeyword" placeholder="Enter guest name or booking reference...">
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary px-4 me-2"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
                        <button type="button" class="btn btn-outline-secondary px-4" onclick="ReservationModule.resetFilter()"><i class="fa-solid fa-rotate-left"></i> Reset</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Reference</th>
                                <th>Guest Name</th>
                                <th>Room Type / Room</th>
                                <th>Check-in Expected</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reservationsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Pagination -->
            <div class="card-footer bg-white border-top-0 py-3">
                <nav>
                    <ul class="pagination justify-content-end mb-0" id="reservationsPagination">
                        <!-- Injected via JS -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Status Edit Modal -->
    <div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <form id="statusForm" onsubmit="event.preventDefault(); ReservationModule.updateStatus();">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Update Reservation Status</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="statusReservationId">
                        <p><strong>Ref:</strong> <span id="statusRefText" class="text-primary fw-bold"></span></p>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="newStatus" required>
                                <option value="PENDING">PENDING</option>
                                <option value="CONFIRMED">CONFIRMED</option>
                                <option value="CHECKED_IN">CHECKED_IN</option>
                                <option value="CHECKED_OUT">CHECKED_OUT</option>
                                <option value="CANCELLED">CANCELLED</option>
                            </select>
                        </div>
                        <div class="alert alert-warning" id="statusWarning" style="display:none;">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i> Warning: Cancelling a reservation cannot be undone.
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary" id="btnUpdateStatus">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/modules/reservations.js"></script>
</body>
</html>
