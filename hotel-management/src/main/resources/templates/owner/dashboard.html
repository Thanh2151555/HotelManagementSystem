<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/owner_layout :: main('Owner Dashboard', ~{::div})}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div class="container-fluid dashboard-container">
        <!-- Top Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-primary text-white h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-white-50">Revenue</h6>
                        <h4 class="fw-bold" id="cardRevenue">₫0</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-info text-white h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-white-50">Occupancy</h6>
                        <h4 class="fw-bold" id="cardOccupancy">0%</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-success text-white h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-white-50">Today Check-In</h6>
                        <h4 class="fw-bold" id="cardCheckin">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-warning text-dark h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-dark-50">Today Check-Out</h6>
                        <h4 class="fw-bold" id="cardCheckout">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-danger text-white h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-white-50">Dirty Rooms</h6>
                        <h4 class="fw-bold" id="cardDirty">0</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-2 col-sm-6">
                <div class="card shadow-sm border-0 bg-secondary text-white h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-white-50">Maintenance</h6>
                        <h4 class="fw-bold" id="cardMaintenance">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Revenue (Last 7 Days)</h5>
                        <canvas id="revenueChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Payment Methods</h5>
                        <canvas id="paymentPieChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Room Status</h5>
                        <canvas id="roomStatusPieChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Top Services -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-3">Top Services</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Service Name</th>
                                        <th>Total Quantity Sold</th>
                                        <th>Total Revenue</th>
                                    </tr>
                                </thead>
                                <tbody id="topServicesBody">
                                    <tr>
                                        <td colspan="3">
                                            <div class="skeleton skeleton-text"></div>
                                            <div class="skeleton skeleton-text"></div>
                                            <div class="skeleton skeleton-text"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/owner-dashboard.js"></script>
</body>
</html>
