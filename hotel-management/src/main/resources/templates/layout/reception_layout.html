<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="main(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Hotel Management System'">Hotel Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="~{layout/sidebar_reception :: sidebar}"></div>

        <!-- Main Content Wrapper -->
        <div class="flex-grow-1" style="min-width: 0;">
            <!-- Navbar Fragment -->
            <div th:replace="~{layout/navbar :: navbar}"></div>

            <!-- Main Content -->
            <div class="p-4" style="height: calc(100vh - 60px); overflow-y: auto;">
                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Core API & Utils -->
    <script src="/js/core/api.js"></script>
    <script src="/js/core/toast.js"></script>
    <script src="/js/core/modal.js"></script>

    <!-- Page Specific Script -->
    <script>
        // Common protection for admin pages
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login?error=unauthorized';
            }
        });
    </script>
</body>
</html>
