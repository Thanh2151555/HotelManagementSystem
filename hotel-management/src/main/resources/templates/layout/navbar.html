<div th:fragment="navbar" class="topbar p-3 d-flex justify-content-between align-items-center">
    <div>
        <h5 class="m-0 fw-bold text-secondary" id="pageTitle">Dashboard</h5>
    </div>
    <div>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-semibold" onclick="logout()">
            <i class="fa-solid fa-sign-out-alt me-1"></i> Logout
        </button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Set Page Title based on URL
            const titleMap = {
                '/admin/dashboard': 'Dashboard Overview',
                '/admin/rooms': 'Room Management',
                '/admin/reservations': 'Reservations',
                '/admin/guests': 'Guest Management',
                '/admin/reports': 'Reports & Analytics'
            };
            const currentPath = window.location.pathname;
            const titleEl = document.getElementById('pageTitle');
            if (titleEl && titleMap[currentPath]) {
                titleEl.textContent = titleMap[currentPath];
            }
        });
    </script>
</div>
